name: Build APK

on:
  push:
    branches: [ main, "claude/**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 학습된 모델 파일이 없으면 더미 파일로 대체 (빌드 확인용)
      - name: Create placeholder assets if missing
        run: |
          mkdir -p app/src/main/assets
          if [ ! -f app/src/main/assets/mobilenetv3_classifier.tflite ]; then
            echo "Placeholder - replace with real model" > app/src/main/assets/mobilenetv3_classifier.tflite
            echo "cat" > app/src/main/assets/labels.txt
            echo "dog" >> app/src/main/assets/labels.txt
            echo "bird" >> app/src/main/assets/labels.txt
            echo "WARNING: Using placeholder model. Replace with real .tflite before use."
          fi

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 14
